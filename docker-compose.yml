services:
  # --- Backend API ---
  backend:
    build: ./backend
    container_name: ai-holding-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://kimi:kimi@postgres:5432/ai_holding
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - ./credentials:/app/credentials:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # --- PostgreSQL ---
  postgres:
    image: postgres:16-alpine
    container_name: ai-holding-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: kimi
      POSTGRES_PASSWORD: kimi
      POSTGRES_DB: ai_holding
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kimi -d ai_holding"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Redis ---
  redis:
    image: redis:7-alpine
    container_name: ai-holding-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Frontend (Next.js) ---
  frontend:
    build: ./frontend
    container_name: ai-holding-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - backend

  # --- Nginx Reverse Proxy ---
  nginx:
    image: nginx:alpine
    container_name: ai-holding-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  redis_data:

  # --- Code Sandbox ---
  sandbox:
    build:
      context: ./backend
      dockerfile: Dockerfile.sandbox
    image: ai-holding-sandbox:latest
    profiles:
      - build-only
